  {min:14,max:17,name:'Ready to build',headline:'Your foundations can support ambitious, well-sequenced work.'},
  {min:18,max:20,name:'Sector-leading',headline:'You are at the frontier. The challenge now is coherence.'}
];
var H1_BY_CONSTRAINT={
  content:'Rewrite your ten highest-intent pages to answer a specific question in the first two lines, and add structured data to your key entity types.',
  data:'Audit where the destination\'s information appears across the major third-party sources, and fix the inconsistencies in your own directory first.',
  tech:'Secure the resource, retained or in-house, and give it a first job it can prove: valid schema on your core pages.',
  capacity:'Name the owner and put AI discoverability into the content and release cycle as a standing item, not a project.',
  governance:'Take the one-page case to leadership, secure the mandate and the owner, then return to the plan.'
};
// [PLACEHOLDER: How-to links per roadmap action -- verify with James]
function dimScore(id){return S.ans[id]!==undefined?S.ans[id]+1:0;}
function total(){return DIMS.reduce(function(s,d){return s+dimScore(d.id);},0);}
function profile(t){return PROFILES.find(function(p){return t>=p.min&&t<=p.max;})||PROFILES[1];}
function rDiagnostic(){
  if(S.diagDone){
    var t=total(),prof=profile(t);
    var gaps=DIMS.map(function(d){return {id:d.id,name:d.name,score:dimScore(d.id),bench:BENCH[d.id],why:d.why};}).sort(function(a,b){return a.score-b.score;});
    var binding=gaps[0];
    var h1=H1_BY_CONSTRAINT[binding.id]||'Address your lowest-scoring dimension first.';
    var h2=gaps[1]?'Improve '+gaps[1].name+'. '+gaps[1].why:'Continue building on your foundation.';
    var h3='Set a fixed prompt set of real traveller questions. Run it across the main assistants quarterly, with memory off. Track branded search as the clearest early proxy for AI influence.';
    return '<div class="page">'+
      phead('Readiness diagnostic','','<circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="1"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3"></path>',true)+
      '<div class="res-header">'+
        '<div class="res-score"><div class="rsc-l">Your overall score</div><div class="rsc-v">'+t+'<span class="max"> / 20</span></div><div class="rsc-name">'+prof.name+'</div><div class="rsc-d">'+prof.headline+'</div></div>'+
        '<div class="card card-pad"><div class="lbl navy" style="margin-bottom:1rem">Your scores against programme peers</div>'+
          DIMS.map(function(d){var sc=dimScore(d.id),b=BENCH[d.id],pct=sc/4*100,bp=b/4*100;return '<div class="dim"><div class="dim-head"><span class="dim-name">'+d.name+'</span><span class="dim-score">'+sc+' / 4</span></div><div class="dim-track"><div class="dim-fill" style="width:'+pct+'%;background:'+(sc>=b?'var(--green)':sc>b-0.5?'var(--amber)':'var(--red)')+'"></div><div class="dim-bench" style="left:'+bp+'%"></div></div><div class="dim-note"><span style="display:inline-block;width:10px;height:2px;background:var(--amber);vertical-align:middle;margin-right:4px"></span>Peer avg '+b.toFixed(1)+' · you '+sc+' '+(sc>b?'▲ above':sc<b?'▼ below':'= at')+' average</div></div>';}).join('')+
        '</div>'+
      '</div>'+
      '<div class="fc warn mb"><div class="fc-l">Binding constraint</div><div class="fc-t"><strong>'+binding.name+'</strong> is your lowest-scoring dimension. '+binding.why+'</div></div>'+
      '<div class="card mb"><div class="sec-head" style="padding:1.1rem 1.3rem 0;margin-bottom:0"><span class="sec-ico use">'+ic('<path d="M3 12h18"></path><path d="m12 3 9 9-9 9"></path>')+'</span><span class="sec-title">Gap analysis</div><div style="padding:1rem 1.3rem 1.3rem">'+
        gaps.slice(0,3).map(function(g,i){var pr=i===0?['Most urgent','var(--red-l)','var(--red)']:i===1?['Address next','var(--amber-l)','var(--amber)']:['Then monitor','var(--green-l)','var(--green)'];return '<div class="gap"><span class="gap-pri" style="background:'+pr[1]+';color:'+pr[2]+'">'+pr[0]+'</span><div><div class="gap-t">'+g.name+' · '+g.score+'/4 (peer avg '+g.bench.toFixed(1)+')</div><div class="gap-d">'+g.why+'</div></div></div>';}).join('')+
      '</div></div>'+
      '<div class="card"><div class="sec-head" style="padding:1.1rem 1.3rem 0;margin-bottom:0"><span class="sec-ico use">'+ic('<rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path>')+'</span><span class="sec-title">Your 90-day roadmap</span></div><div style="padding:1.1rem 1.3rem 1.3rem"><div class="rm-grid">'+
        [['Weeks 1 to 4','var(--red)',h1],['Weeks 5 to 8','var(--amber)',h2],['Weeks 9 to 12','var(--green)',h3]].map(function(c){return '<div><div class="rm-head" style="color:'+c[1]+';border-color:'+c[1]+'">'+c[0]+'</div><div class="rm-item">'+c[2]+'</div></div>';}).join('')+
      '</div><div style="font-size:.75rem;color:var(--muted);background:var(--bg);padding:.6rem .9rem;border-radius:3px;border:1px solid var(--border);margin-top:1rem">Data is collected anonymously to power benchmarking in a later release. No scores are shown until there is a base to benchmark against.<br><br>[PLACEHOLDER: How-to links per roadmap action -- verify with James]</div>'+
      '<div style="display:flex;gap:.6rem;margin-top:1rem">'+dlbtn('PDF')+'<button class="retake-btn" id="d-reset">Retake</button></div></div></div>'+
    '</div>';
  }
  var dim=DIMS[S.diagStep],pct=Math.round(S.diagStep/DIMS.length*100);
  return '<div class="page">'+
    phead('Readiness diagnostic','','<circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="1"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3"></path>',true)+
    '<div class="g2 mb" style="gap:1rem">'+
      '<div class="fc key"><div class="fc-l">What this produces</div><div class="fc-t" style="font-size:.875rem;font-weight:400">Five questions, one per dimension of readiness. Your answers produce a scored profile benchmarked against the community, a gap analysis and a prioritised 90-day plan. The plan changes with your profile: two different scores produce two different roadmaps.</div></div>'+
      '<div class="fc warn"><div class="fc-l">How to answer</div><div class="fc-t" style="font-size:.875rem;font-weight:400">Answer for your current reality, not your aspirations. If you are between two options, choose the lower one. Over-estimating is the main reason a result feels irrelevant.</div></div>'+
    '</div>'+
    '<div id="diag-anchor"></div>'+
    '<div class="diag-wrap">'+
      '<div class="diag-prog-row"><span class="diag-prog-l">Dimension '+(S.diagStep+1)+' of '+DIMS.length+'</span><span class="diag-prog-l">'+pct+'% complete</span></div>'+
      '<div class="diag-prog-bar"><div class="diag-prog-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="diag-dim-l">Dimension '+(S.diagStep+1)+' · '+dim.name+'</div>'+
      '<div class="diag-q">'+dim.q+'</div><div class="diag-sub">'+dim.sub+'</div>'+
      '<div class="diag-opts">'+dim.opts.map(function(o,i){return '<div class="diag-opt'+(S.ans[dim.id]===i?' sel':'')+'" data-oi="'+i+'"><div class="diag-opt-n">'+(i+1)+'</div><div><div class="diag-opt-t">'+o[0]+'</div><div class="diag-opt-d">'+o[1]+'</div></div></div>';}).join('')+'</div>'+
      '<div class="diag-nav"><button class="d-btn sec" id="d-back" '+(S.diagStep===0?'disabled':'')+'>Back</button><span style="font-size:.75rem;color:var(--muted)">Score 1 to 4 · 20 maximum</span><button class="d-btn pri" id="d-next" '+(S.ans[dim.id]===undefined?'disabled':'')+'>'+(S.diagStep===DIMS.length-1?'See my profile':'Next')+'</button></div>'+
    '</div>'+
  '</div>';
}

/* ---------- IMPLEMENTATION PLAN ---------- */
function rPlan(){
  var tasks=(MEMBER.get('plan').tasks||[]).slice();
  var phases=['Foundation','Accelerate','Embed'];
  var phaseDescs=['Weeks 1 to 4','Weeks 5 to 8','Weeks 9 to 12'];
  var isEmpty=tasks.length===0;
  var cols=phases.map(function(ph,pi){
    var phaseTasks=tasks.filter(function(t){return (t.phase||'Foundation')===ph;});
    var cards=phaseTasks.map(function(t,ti){
      var realIdx=tasks.findIndex(function(x){return x.id===t.id;});
      return '<div class="plan-task'+(t.addedByUser?' manual':'')+(t.done?' plan-task-done':'')+'" data-task-id="'+t.id+'">'+
        '<div class="plan-task-title"><input type="checkbox" class="plan-done-check" '+(t.done?'checked':'')+' data-task-check="'+t.id+'"><span>'+t.title+'</span><button class="plan-task-remove" data-task-remove="'+t.id+'" title="Remove">×</button></div>'+
        '<div class="plan-task-meta">Source: '+t.source+(t.assignee?' · Assignee: '+t.assignee:'')+'</div>'+
        '<div class="plan-task-fields">'+
          '<div class="plan-task-field"><label>Assignee</label><input type="text" placeholder="Name or role" value="'+(t.assignee||'')+'" data-task-assignee="'+t.id+'"></div>'+
          '<div class="plan-task-field"><label>Frequency</label><select data-task-freq="'+t.id+'"><option value="one-off"'+(t.frequency==='one-off'?' selected':'')+'>One-off</option><option value="monthly"'+(t.frequency==='monthly'?' selected':'')+'>Monthly</option><option value="quarterly"'+(t.frequency==='quarterly'?' selected':'')+'>Quarterly</option></select></div>'+
        '</div>'+
      '</div>';
    }).join('');
    return '<div><div class="plan-phase-head">'+ph+'<span style="font-weight:300;opacity:.6;margin-left:.5rem;font-size:.5625rem">'+phaseDescs[pi]+'</span></div>'+
      (phaseTasks.length===0?'<div class="plan-empty">No tasks yet in this phase.</div>':cards)+'</div>';
  }).join('');

  return '<div class="page">'+
    phead('Implementation plan',isEmpty?'Your plan is empty. Work through the tools in Get started and add actions as you go.':'Your personal roadmap for AI discoverability.')+
    (isEmpty?'<div class="plan-empty">Your plan is empty. Work through the tools in the Toolkit and add actions as you go.<br><br><button class="d-btn pri" onclick="set({sec:\'tools\'})">Go to Get started</button></div>':
      '<div style="display:flex;justify-content:flex-end;margin-bottom:1rem"><button class="plan-export" id="plan-csv">'+ic('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>')+'Export CSV</button></div>'+
      '<div class="plan-col">'+cols+'</div>')+
    '<div class="plan-add-form"><input type="text" id="plan-new-title" placeholder="Add a task..."><select id="plan-new-phase"><option>Foundation</option><option>Accelerate</option><option>Embed</option></select><button class="d-btn pri" id="plan-add-btn">Add</button></div>'+
    memnod+
  '</div>';
}

/* ---------- RENDER + BIND ---------- */
function render(){
  document.querySelectorAll('.tb').forEach(function(el){el.classList.toggle('on',el.dataset.sec===S.sec);});
  document.querySelectorAll('#sbnav .ni[data-sec]').forEach(function(el){el.classList.toggle('on',el.dataset.sec===S.sec);});
  var m={overview:rOverview,snapshot:rSnapshot,deepdive:rDeepDive,bestpractice:rBestPractice,diagnostic:rDiagnostic,tools:rTools,resources:rResources,plan:rPlan};
  document.getElementById('main').innerHTML=(m[S.sec]||rOverview)();
  bind();
}
function bind(){
  document.querySelectorAll('.route[data-goto]').forEach(function(el){el.addEventListener('click',function(){set({sec:el.dataset.goto});window.scrollTo({top:0,behavior:'smooth'});});});
  function tabKeys(sel,key){document.querySelectorAll(sel).forEach(function(el){el.addEventListener('keydown',function(e){if(e.key!=='ArrowRight'&&e.key!=='ArrowLeft')return;e.preventDefault();var tabs=[].slice.call(document.querySelectorAll(sel));var i=tabs.indexOf(el);var n=(i+(e.key==='ArrowRight'?1:tabs.length-1))%tabs.length;var p={};p[key]=n;set(p);setTimeout(function(){var t=document.querySelector(sel.replace(']','="'+n+'"]'));if(t)t.focus();},0);});});}
  document.querySelectorAll('.ptab[data-ddpart]').forEach(function(el){el.addEventListener('click',function(){set({ddPart:parseInt(el.dataset.ddpart)});});});
  document.querySelectorAll('.ptab[data-stage]').forEach(function(el){el.addEventListener('click',function(){set({stage:parseInt(el.dataset.stage)});});});
  tabKeys('.ptab[data-ddpart]','ddPart');tabKeys('.ptab[data-stage]','stage');

  // addplan with MEMBER persistence + nav flash
  document.querySelectorAll('.addplan[data-plan]').forEach(function(el){el.addEventListener('click',function(){
    var id=el.dataset.plan,title=el.dataset.planTitle||id,phase=el.dataset.planPhase||'Foundation',source=el.dataset.planSource||'tool';
    var tasks=MEMBER.get('plan').tasks||[];
    var exists=tasks.some(function(t){return t.id===id;});
    if(!exists){tasks.push({id:id,title:title,phase:phase,source:source,assignee:'',frequency:'one-off',addedByUser:false,done:false});MEMBER.set('plan',{tasks:tasks});}
    var p={};Object.assign(p,S.plan);p[id]=true;set({plan:p});
    // flash plan nav item
    var planBtn=document.querySelector('[data-sec="plan"]');
    if(planBtn){planBtn.classList.add('flash');setTimeout(function(){planBtn.classList.remove('flash');},700);}
  });});

  // diagnostic opts
  document.querySelectorAll('.diag-opt[data-oi]').forEach(function(el){el.addEventListener('click',function(){var id=DIMS[S.diagStep].id,a={};Object.assign(a,S.ans);a[id]=parseInt(el.dataset.oi);set({ans:a});});});
  var dn=document.getElementById('d-next');if(dn)dn.addEventListener('click',function(){
    if(S.diagStep<DIMS.length-1){set({diagStep:S.diagStep+1});document.getElementById('diag-anchor')&&document.getElementById('diag-anchor').scrollIntoView({block:'start',behavior:'instant'});}
    else{set({diagDone:true});MEMBER.set('diagnostic',{answers:S.ans,profile:profile(total()).name,completedAt:new Date().toISOString()});window.scrollTo({top:0,behavior:'smooth'});}
  });
  var db=document.getElementById('d-back');if(db)db.addEventListener('click',function(){if(S.diagStep>0){set({diagStep:S.diagStep-1});document.getElementById('diag-anchor')&&document.getElementById('diag-anchor').scrollIntoView({block:'start',behavior:'instant'});}});
  var dr=document.getElementById('d-reset');if(dr)dr.addEventListener('click',function(){set({diagStep:0,ans:{},diagDone:false});MEMBER.set('diagnostic',{answers:{},profile:null,completedAt:null});});

  // tool cards open in panel
  document.querySelectorAll('.tool[data-tool]').forEach(function(el){el.addEventListener('click',function(e){
    if(e.target.closest('.addplan'))return;
    var id=el.dataset.tool;
    var urls={advisor:'/tools/content-geo-strategy-advisor.html',checker:'/tools/tactics-ethics-checker.html',plan:null};
    if(id==='plan'){set({sec:'plan'});return;}
    var url=urls[id];if(!url)return;
    var panel=document.getElementById('tool-panel');
    var frame=document.getElementById('tool-frame');
    var title=document.getElementById('tool-panel-title');
    if(panel&&frame){frame.src=url;title.textContent=el.querySelector('.tool-name').textContent;panel.classList.add('open');}
  });});

  // plan section bindings
  document.querySelectorAll('[data-task-remove]').forEach(function(el){el.addEventListener('click',function(){
    var id=el.dataset.taskRemove;var tasks=(MEMBER.get('plan').tasks||[]).filter(function(t){return t.id!==id;});MEMBER.set('plan',{tasks:tasks});var p={};Object.assign(p,S.plan);delete p[id];set({plan:p});
  });});
  document.querySelectorAll('[data-task-check]').forEach(function(el){el.addEventListener('change',function(){
    var id=el.dataset.taskCheck;var tasks=MEMBER.get('plan').tasks||[];tasks.forEach(function(t){if(t.id===id)t.done=el.checked;});MEMBER.set('plan',{tasks:tasks});render();
  });});
  document.querySelectorAll('[data-task-assignee]').forEach(function(el){el.addEventListener('blur',function(){
    var id=el.dataset.taskAssignee;var tasks=MEMBER.get('plan').tasks||[];tasks.forEach(function(t){if(t.id===id)t.assignee=el.value;});MEMBER.set('plan',{tasks:tasks});
  });});
  document.querySelectorAll('[data-task-freq]').forEach(function(el){el.addEventListener('change',function(){
    var id=el.dataset.taskFreq;var tasks=MEMBER.get('plan').tasks||[];tasks.forEach(function(t){if(t.id===id)t.frequency=el.value;});MEMBER.set('plan',{tasks:tasks});
  });});
  var planAdd=document.getElementById('plan-add-btn');if(planAdd)planAdd.addEventListener('click',function(){
    var inp=document.getElementById('plan-new-title');var ph=document.getElementById('plan-new-phase');
    if(!inp||!inp.value.trim())return;
    var tasks=MEMBER.get('plan').tasks||[];
    var id='manual-'+Date.now();
    tasks.push({id:id,title:inp.value.trim(),phase:ph?ph.value:'Foundation',source:'manual',assignee:'',frequency:'one-off',addedByUser:true,done:false});
    MEMBER.set('plan',{tasks:tasks});inp.value='';render();
  });
  var planCSV=document.getElementById('plan-csv');if(planCSV)planCSV.addEventListener('click',function(){
    var tasks=MEMBER.get('plan').tasks||[];
    var csv='Title,Phase,Source,Assignee,Frequency,Done\n'+tasks.map(function(t){return [t.title,t.phase,t.source,t.assignee||'',t.frequency||'',t.done?'Yes':'No'].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
    var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='implementation-plan.csv';a.click();
  });
}

// tool panel back button
document.addEventListener('click',function(e){
  var backBtn=e.target.closest('#tool-back');
  if(backBtn){var panel=document.getElementById('tool-panel');if(panel){panel.classList.remove('open');setTimeout(function(){document.getElementById('tool-frame').src='';},260);}}
});

// top nav and sidebar nav
document.querySelectorAll('.tb[data-sec]').forEach(function(el){el.addEventListener('click',function(){set({sec:el.dataset.sec});window.scrollTo({top:0,behavior:'smooth'});});});
document.querySelectorAll('#sbnav .ni[data-sec]').forEach(function(el){el.addEventListener('click',function(){set({sec:el.dataset.sec});window.scrollTo({top:0,behavior:'smooth'});});});

// restore diagnostic from MEMBER
(function(){var d=MEMBER.get('diagnostic');if(d&&d.completedAt){S.diagDone=true;S.ans=d.answers||{};}})();

render();
</script>
