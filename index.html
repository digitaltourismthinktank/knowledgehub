<style>
:root{
  --navy:#0F2044;--navy-deep:#0A1733;--navy-mid:#1A3060;--navy-light:#E8EDF5;--navy-rule:#CBD5E8;
  --teal:#00857C;--teal-dark:#006B63;--teal-light:#E6F3F2;--teal-text:#006B63;
  --white:#FFFFFF;--bg:#F7F8FA;--surface:#FFFFFF;--border:#E2E6EF;
  --text:#0F2044;--sub:#4A5568;--muted:#8A94A6;
  --green:#1A7A4A;--green-l:#E6F4ED;
  --amber:#925A00;--amber-l:#FEF3E2;
  --red:#9B1C1C;--red-l:#FEF2F2;
  --font:'Inter',-apple-system,sans-serif;
  --font-alt:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:.875rem;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
.app{display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}

/* SIDEBAR (canonical shell) */
.sidebar{width:256px;min-width:256px;background:var(--navy-deep);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;box-shadow:inset -1px 0 0 rgba(255,255,255,.07),6px 0 28px rgba(10,23,51,.22);z-index:2}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{height:28px;width:auto;margin-bottom:15px;opacity:.96}
.sb-org{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;background:rgba(255,255,255,.05);cursor:pointer;transition:background .14s}
.sb-org:hover{background:rgba(255,255,255,.09)}
.sb-org-mark{width:30px;height:30px;border-radius:4px;background:linear-gradient(135deg,#27457E,#16284E);display:flex;align-items:center;justify-content:center;font-family:var(--font-alt);font-weight:700;font-size:.8125rem;color:#fff;flex-shrink:0}
.sb-org-info{min-width:0;flex:1}
.sb-org-name{font-family:var(--font-alt);font-size:.8125rem;font-weight:600;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-org-tier{display:flex;align-items:center;gap:5px;font-size:.625rem;color:rgba(255,255,255,.5);font-family:var(--font-mono);letter-spacing:.02em;margin-top:2px}
.sb-org-tier .dot{width:5px;height:5px;border-radius:50%;background:#8FA4C8}
.sb-nav{flex:1;overflow-y:auto;padding:10px 12px}
.sb-nav::-webkit-scrollbar{width:0}
.sb-back{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:0 0 6px;font-size:.75rem;font-weight:500;color:rgba(255,255,255,.5);font-family:var(--font-alt);cursor:pointer;border-radius:4px;transition:all .14s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.sb-back:hover{color:#fff;background:rgba(255,255,255,.06)}
.sb-back svg{width:14px;height:14px;flex-shrink:0;opacity:.85}
.sb-section{font-size:.5625rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.26);padding:14px 10px 6px;font-family:var(--font-alt)}
.ni{display:flex;align-items:center;gap:11px;padding:8px 11px;cursor:pointer;font-size:.8125rem;font-weight:400;color:rgba(255,255,255,.55);transition:all .14s;border-radius:4px;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
.ni.on{color:#fff;background:rgba(255,255,255,.1);font-weight:500}
.ni svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
.ni .use-dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.sb-foot{padding:10px 12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:10px;padding:9px 10px 9px;margin-top:6px;border-top:1px solid rgba(255,255,255,.07)}
.sb-ava{width:30px;height:30px;border-radius:50%;background:#27457E;display:flex;align-items:center;justify-content:center;font-size:.6875rem;font-weight:600;color:#fff;font-family:var(--font-alt);flex-shrink:0}
.sb-user-info{min-width:0;flex:1}
.sb-user-name{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:.625rem;color:rgba(255,255,255,.4)}

/* MAIN */
.main-col{flex:1;min-width:0;background:var(--bg)}
.top-bar{background:var(--navy)}
.top-bar-inner{padding:1.9rem 2.75rem 1.9rem;max-width:1180px}
.bc{font-size:.6875rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.85rem;display:flex;align-items:center;gap:.55rem;font-family:var(--font-alt)}
.bc .sep{color:rgba(255,255,255,.22)}
.live-mini{display:inline-flex;align-items:center;gap:.45rem;color:#8FE3B4;margin-left:.3rem}
.live-mini .d{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(26,122,74,.28)}
h1.pt{font-family:var(--font-alt);font-size:1.85rem;font-weight:600;color:#fff;line-height:1.14;letter-spacing:-.02em;margin-bottom:.5rem}
.ps{font-size:.9375rem;font-weight:300;color:rgba(255,255,255,.64);max-width:620px;line-height:1.6}

/* TAB NAV */
.tab-nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.tab-nav-inner{padding:0 2.75rem;max-width:1180px;display:flex;align-items:stretch;gap:0;overflow-x:auto}
.tb{padding:.95rem 1.05rem;font-size:.8125rem;font-weight:400;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .14s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-alt);display:flex;align-items:center;gap:.5rem;user-select:none}
.tb:hover{color:var(--text)}
.tb.on{color:var(--navy);font-weight:600;border-bottom-color:var(--navy)}
.tb .use-dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}
.tb.on.use{border-bottom-color:var(--teal);color:var(--teal-dark)}

.page{padding:1.9rem 2.75rem 4rem;max-width:1180px;animation:up .2s ease}
@keyframes up{from{transform:translateY(5px)}to{transform:none}}

/* META BAR */
.meta-bar{background:var(--surface);border:1px solid var(--border);border-radius:4px;display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden;margin-bottom:1.75rem}
.mc{padding:1rem 1.15rem;border-right:1px solid var(--border)}
.mc:last-child{border-right:none}
.mc-l{font-size:.5625rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;font-family:var(--font-alt)}
.mc-v{font-family:var(--font-alt);font-size:.9375rem;font-weight:600;color:var(--text);line-height:1.3}

/* SECTION HEADERS (read=navy, use=teal) */
.sec-head{display:flex;align-items:center;gap:.7rem;margin-bottom:1.05rem}
.sec-ico{width:30px;height:30px;border-radius:4px;background:var(--navy-light);color:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-ico.use{background:var(--teal-light);color:var(--teal-dark)}
.sec-ico svg{width:16px;height:16px}
.sec-title{font-family:var(--font-alt);font-size:1.0625rem;font-weight:600;color:var(--navy);letter-spacing:-.01em;white-space:nowrap}
.sec-sub{font-size:.8125rem;color:var(--sub);font-weight:300;margin-left:auto;text-align:right}

.card{background:var(--surface);border:1px solid var(--border);border-radius:4px}
.card-pad{padding:1.4rem 1.5rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem}
.g2r{display:grid;grid-template-columns:1.5fr 1fr;gap:1.4rem;align-items:start}
.mb{margin-bottom:1.4rem}

.lbl{font-size:.5625rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);font-family:var(--font-alt)}
.lbl.navy{color:var(--navy);opacity:.7}
.lbl.teal{color:var(--teal-text)}
.body3{font-size:.875rem;color:var(--sub);line-height:1.72;font-weight:300;text-wrap:pretty}
.body3 p{margin-bottom:.8rem}.body3 p:last-child{margin-bottom:0}
.body3 strong{color:var(--text);font-weight:500}

/* THESIS / FINDING CARDS */
.fc{border-radius:4px;padding:1.2rem 1.35rem;border-left:3px solid}
.fc.key{background:var(--navy-light);border-color:var(--navy)}
.fc.warn{background:var(--amber-l);border-color:var(--amber)}
.fc.good{background:var(--green-l);border-color:var(--green)}
.fc-l{font-size:.5625rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;margin-bottom:.5rem;font-family:var(--font-alt)}
.fc.key .fc-l{color:var(--navy)}.fc.warn .fc-l{color:var(--amber)}.fc.good .fc-l{color:var(--green)}
.fc-t{font-size:.9375rem;line-height:1.65;font-weight:400;text-wrap:pretty}
.fc.key .fc-t{color:var(--navy)}.fc.warn .fc-t{color:#78420A}.fc.good .fc-t{color:#14532D}

/* STAT CARDS */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem 1.3rem}
.stat-v{font-family:var(--font-alt);font-size:1.85rem;font-weight:600;line-height:1;letter-spacing:-.02em;margin-bottom:.55rem;color:var(--navy)}
.stat-l{font-size:.8125rem;color:var(--sub);font-weight:300;line-height:1.5}
.stat-s{font-size:.625rem;color:var(--muted);font-family:var(--font-mono);margin-top:.6rem;letter-spacing:.01em}

/* ROUTING LIST */
.route{display:flex;align-items:center;gap:.95rem;padding:.95rem 1.1rem;cursor:pointer;border-radius:3px;transition:background .13s}
.route:hover{background:var(--navy-light)}
.route+.route{border-top:1px solid var(--border)}
.route-n{font-family:var(--font-mono);font-size:.6875rem;color:var(--muted);width:20px;flex-shrink:0}
.route-t{font-size:.875rem;font-weight:500;margin-bottom:.15rem}
.route-d{font-size:.8125rem;color:var(--sub);font-weight:300}
.route-ar{margin-left:auto;color:var(--muted);font-size:.85rem}

/* BARS */
.bi{display:flex;align-items:center;gap:.75rem;margin-bottom:.7rem}
.bi:last-child{margin-bottom:0}
.bi-name{font-size:.8125rem;color:var(--sub);font-weight:300;flex:1}
.bi-track{flex:0 0 120px;height:5px;background:var(--navy-light);border-radius:2px;overflow:hidden}
.bi-fill{height:100%;border-radius:2px;background:var(--navy)}
.bi-val{font-family:var(--font-mono);font-size:.6875rem;font-weight:500;color:var(--navy);min-width:30px;text-align:right}

/* EXTERNAL DATA BADGE */
.ext-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.5625rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .5rem;border-radius:2px;background:var(--amber-l);color:var(--amber);border:1px solid #E8C98A;font-family:var(--font-alt)}

/* ACCORDION (deep dive) */
.acc{border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--surface)}
.acc-item+.acc-item{border-top:1px solid var(--border)}
.acc-row{display:grid;grid-template-columns:30px 1fr auto;gap:1rem;padding:1.15rem 1.3rem;cursor:pointer;user-select:none;transition:background .14s;align-items:start}
.acc-row:hover{background:var(--bg)}
.acc-item.open .acc-row{background:var(--navy-light)}
.acc-num{width:30px;height:30px;background:var(--navy-light);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.6875rem;font-weight:500;color:var(--navy);flex-shrink:0}
.acc-item.open .acc-num{background:var(--navy);color:#fff}
.acc-eyebrow{font-size:.5625rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--teal-text);font-family:var(--font-alt);margin-bottom:.3rem}
.acc-title{font-family:var(--font-alt);font-size:1rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:.3rem}
.acc-arg{font-size:.875rem;color:var(--sub);font-weight:300;line-height:1.6}
.acc-chev{color:var(--muted);transition:transform .22s;font-size:.7rem;margin-top:.5rem}
.acc-item.open .acc-chev{transform:rotate(180deg);color:var(--navy)}
.acc-body{display:none;padding:0 1.3rem 1.4rem 4.3rem}
.acc-item.open .acc-body{display:block}

.pos-strip{background:var(--navy);border-radius:4px;padding:1.2rem 1.4rem;color:#fff;margin:1.1rem 0}
.pos-l{font-size:.5625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.45;margin-bottom:.5rem;font-family:var(--font-alt)}
.pos-t{font-size:.9375rem;font-weight:400;line-height:1.65;max-width:680px;color:rgba(255,255,255,.92)}
.ctr-box{background:var(--red-l);border:1px solid #F5AEAD;border-radius:4px;padding:1rem 1.2rem;margin-top:1.1rem}
.ctr-l{font-size:.5625rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:.45rem;font-family:var(--font-alt)}
.ctr-t{font-size:.8125rem;color:#7F1D1D;line-height:1.65;font-weight:300}

/* BEFORE/AFTER */
.ba{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin:1.1rem 0}
.ba-l{font-size:.5625rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;margin-bottom:.5rem;font-family:var(--font-alt)}
.ba-c{font-size:.8125rem;padding:.95rem 1.05rem;border-radius:3px;border:1px solid var(--border);line-height:1.6;color:var(--sub);font-weight:300;background:var(--bg)}
.ba-c.after{background:var(--green-l);border-color:#A7D7B8;color:#14532D;font-weight:400}

/* BEST PRACTICE */
.bp-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.3rem 1.4rem}
.bp-org{font-size:.5625rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-family:var(--font-alt)}
.bp-title{font-family:var(--font-alt);font-size:1rem;font-weight:600;line-height:1.3;margin-bottom:.55rem;color:var(--text)}
.bp-sum{font-size:.8125rem;color:var(--sub);line-height:1.6;font-weight:300;margin-bottom:.9rem}
.bp-pending{display:flex;align-items:center;gap:.6rem;padding:.7rem .85rem;background:var(--bg);border:1px dashed var(--navy-rule);border-radius:3px;font-size:.75rem;color:var(--muted);font-weight:400;line-height:1.45}
.bp-pending svg{width:15px;height:15px;flex-shrink:0;color:var(--amber)}

/* TOOLS (use=teal) */
.tool{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.3rem 1.4rem;display:flex;flex-direction:column;cursor:pointer;transition:all .16s}
.tool:hover{border-color:#B2D8D5;box-shadow:0 4px 14px rgba(0,133,124,.08);transform:translateY(-1px)}
.tool.featured{grid-column:span 3;flex-direction:row;align-items:center;gap:1.5rem;background:var(--teal-light);border-color:#B2D8D5}
.tool-top{display:flex;align-items:center;gap:.65rem;margin-bottom:.9rem}
.tool-ico{width:34px;height:34px;border-radius:4px;background:var(--teal-light);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tool-ico svg{width:18px;height:18px}
.tool.featured .tool-ico{width:48px;height:48px;background:var(--teal);color:#fff;margin-bottom:0}
.tool.featured .tool-ico svg{width:24px;height:24px}
.tool-type{font-size:.5625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-text);font-family:var(--font-alt)}
.tool-name{font-family:var(--font-alt);font-size:1rem;font-weight:600;color:var(--text);line-height:1.25;margin-bottom:.5rem}
.tool.featured .tool-main{flex:1}
.tool.featured .tool-name{font-size:1.2rem;margin-bottom:.35rem}
.tool-job{font-size:.8125rem;color:var(--sub);font-weight:300;line-height:1.55;margin-bottom:1rem}
.tool.featured .tool-job{font-size:.875rem;margin-bottom:0;max-width:560px}
.tool-foot{display:flex;align-items:center;gap:.65rem;margin-top:auto;flex-wrap:wrap}
.meta-pill{font-size:.625rem;font-weight:500;color:var(--muted);font-family:var(--font-mono);white-space:nowrap}
.meta-pill.dot::before{content:"·";margin-right:.6rem;color:var(--border)}
.deadline-pill{font-size:.5625rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.22rem .55rem;border-radius:2px;background:var(--amber-l);color:var(--amber);border:1px solid #E8C98A;font-family:var(--font-alt)}
.tool-arrow{margin-left:auto;color:var(--teal-dark);font-size:.85rem;opacity:.5;transition:all .16s}
.tool:hover .tool-arrow{opacity:1;transform:translateX(2px)}
.go{display:inline-flex;align-items:center;gap:.5rem;background:var(--teal);color:#fff;font-size:.8125rem;font-weight:600;padding:.7rem 1.25rem;border-radius:3px;font-family:var(--font-alt);white-space:nowrap;flex-shrink:0;transition:background .15s}
.tool.featured:hover .go{background:var(--teal-dark)}

/* RESOURCES */
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.2rem 1.3rem;transition:all .15s;cursor:pointer}
.res-card:hover{border-color:var(--navy-rule);box-shadow:0 2px 10px rgba(15,32,68,.07)}
.res-fmt{font-size:.5625rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-family:var(--font-alt)}
.res-title{font-family:var(--font-alt);font-size:.9375rem;font-weight:600;margin-bottom:.4rem}
.res-desc{font-size:.8125rem;color:var(--sub);font-weight:300;line-height:1.5;margin-bottom:.8rem}
.res-dl{font-size:.75rem;font-weight:600;color:var(--navy);font-family:var(--font-alt);display:inline-flex;align-items:center;gap:.4rem}
.toollist{display:grid;grid-template-columns:1fr 1fr;gap:.6rem .9rem}
.toollist-item{display:flex;align-items:baseline;gap:.6rem;font-size:.8125rem;color:var(--sub);font-weight:300;padding:.4rem 0;border-bottom:1px solid var(--border)}
.toollist-item b{color:var(--text);font-weight:500}

/* DIAGNOSTIC (use=teal) */
.diag-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.9rem 2.1rem;max-width:720px}
.diag-prog-row{display:flex;justify-content:space-between;margin-bottom:.45rem}
.diag-prog-l{font-size:.6875rem;font-weight:500;color:var(--muted);font-family:var(--font-mono)}
.diag-prog-bar{height:4px;background:var(--navy-light);border-radius:2px;overflow:hidden;margin-bottom:1.6rem}
.diag-prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease}
.diag-dim-l{font-size:.5625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-text);margin-bottom:.65rem;font-family:var(--font-alt)}
.diag-q{font-family:var(--font-alt);font-size:1.2rem;font-weight:600;line-height:1.35;margin-bottom:.5rem;color:var(--navy)}
.diag-sub{font-size:.875rem;color:var(--sub);line-height:1.6;margin-bottom:1.35rem;font-weight:300}
.diag-opts{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.45rem}
.diag-opt{padding:.9rem 1.05rem;border-radius:3px;border:1.5px solid var(--border);cursor:pointer;transition:all .14s;display:flex;align-items:flex-start;gap:.85rem}
.diag-opt:hover{border-color:var(--teal);background:var(--teal-light)}
.diag-opt.sel{border-color:var(--teal);background:var(--teal-light)}
.diag-opt-n{font-family:var(--font-mono);font-size:.6875rem;color:var(--muted);min-width:16px;padding-top:2px;font-weight:500}
.diag-opt.sel .diag-opt-n{color:var(--teal-text);font-weight:700}
.diag-opt-t{font-size:.875rem;font-weight:500;color:var(--text);margin-bottom:.2rem}
.diag-opt-d{font-size:.8125rem;color:var(--sub);font-weight:300;line-height:1.45}
.diag-nav{display:flex;align-items:center;justify-content:space-between}
.d-btn{padding:.7rem 1.4rem;border-radius:3px;font-size:.8125rem;font-weight:600;cursor:pointer;transition:all .14s;border:none;font-family:var(--font-alt)}
.d-btn.pri{background:var(--teal);color:#fff}
.d-btn.pri:hover{background:var(--teal-dark)}
.d-btn.sec{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.d-btn.sec:hover{border-color:var(--navy);color:var(--navy)}
.d-btn:disabled{opacity:.35;pointer-events:none}
.res-header{display:grid;grid-template-columns:1fr 1.3fr;gap:1.1rem;margin-bottom:1.4rem}
.res-score{background:var(--navy);border-radius:4px;padding:1.6rem 1.8rem;color:#fff}
.rsc-l{font-size:.5625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.45;margin-bottom:.6rem;font-family:var(--font-alt)}
.rsc-v{font-family:var(--font-alt);font-size:3.2rem;font-weight:600;line-height:1}
.rsc-v .max{font-size:1rem;opacity:.4;font-weight:300}
.rsc-name{font-family:var(--font-alt);font-size:1.15rem;font-weight:600;margin-top:.7rem;margin-bottom:.35rem}
.rsc-d{font-size:.8125rem;opacity:.6;line-height:1.55;font-weight:300}
.dim{margin-bottom:.95rem}.dim:last-child{margin-bottom:0}
.dim-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.32rem}
.dim-name{font-size:.8125rem;font-weight:400}
.dim-score{font-family:var(--font-mono);font-size:.6875rem;font-weight:600;color:var(--navy)}
.dim-track{height:5px;background:var(--navy-light);border-radius:2px;overflow:hidden;position:relative}
.dim-fill{height:100%;border-radius:2px}
.dim-bench{position:absolute;width:2px;background:var(--amber);height:100%;top:0;opacity:.85}
.dim-note{font-size:.6875rem;color:var(--muted);margin-top:.35rem;font-weight:400}
.gap{margin-bottom:.7rem;padding:.9rem 1.05rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;display:grid;grid-template-columns:auto 1fr;gap:.85rem;align-items:start}
.gap-pri{font-size:.5625rem;font-weight:700;padding:.22rem .6rem;border-radius:2px;white-space:nowrap;font-family:var(--font-alt);height:fit-content}
.gap-t{font-size:.875rem;font-weight:500;margin-bottom:.25rem}
.gap-d{font-size:.8125rem;color:var(--sub);font-weight:300;line-height:1.5}
.rm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.rm-head{font-size:.625rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding-bottom:.6rem;border-bottom:2px solid;margin-bottom:.85rem;font-family:var(--font-alt)}
.rm-item{background:var(--bg);border-radius:3px;padding:.75rem .85rem;margin-bottom:.55rem;border:1px solid var(--border);font-size:.8125rem;color:var(--text);font-weight:400;line-height:1.5}

/* ADVISORY */
.advisory{background:var(--teal);border-radius:4px;padding:1.9rem 2.2rem;color:#fff;display:grid;grid-template-columns:1fr auto;align-items:center;gap:2rem;position:relative;overflow:hidden;margin-top:1.4rem}
.advisory::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.05)}
.adv-l{position:relative;z-index:1}
.adv-eyebrow{font-size:.5625rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.7);font-family:var(--font-alt);margin-bottom:.7rem}
.adv-title{font-family:var(--font-alt);font-size:1.35rem;font-weight:600;line-height:1.2;margin-bottom:.6rem;max-width:520px}
.adv-body{font-size:.9375rem;font-weight:300;color:rgba(255,255,255,.88);line-height:1.6;max-width:560px}
.adv-r{display:flex;flex-direction:column;gap:.7rem;position:relative;z-index:1;flex-shrink:0}
.adv-primary{display:inline-flex;align-items:center;justify-content:center;gap:.55rem;background:#fff;color:var(--teal-dark);font-size:.875rem;font-weight:600;padding:.85rem 1.6rem;border-radius:3px;font-family:var(--font-alt);white-space:nowrap;cursor:pointer;transition:all .16s}
.adv-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.16)}
.adv-secondary{display:inline-flex;align-items:center;justify-content:center;font-size:.8125rem;font-weight:500;color:rgba(255,255,255,.9);padding:.6rem 1.6rem;border-radius:3px;border:1.5px solid rgba(255,255,255,.35);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font-alt)}
.adv-secondary:hover{border-color:#fff;background:rgba(255,255,255,.08)}

.upnext{background:var(--navy);border-radius:4px;padding:1.5rem 1.7rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;margin-top:1.4rem}
.upnext-l{font-size:.5625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--font-alt);margin-bottom:.45rem}
.upnext-t{font-family:var(--font-alt);font-size:1.1rem;font-weight:600;color:#fff;margin-bottom:.35rem}
.upnext-d{font-size:.8125rem;color:rgba(255,255,255,.55);line-height:1.55;max-width:520px;font-weight:300}
.upnext-cta{font-size:.8125rem;font-weight:600;background:rgba(255,255,255,.1);color:#fff;padding:.7rem 1.3rem;border-radius:3px;font-family:var(--font-alt);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:background .15s}
.upnext-cta:hover{background:rgba(255,255,255,.18)}

/* ============ SYSTEM ADDITIONS · team review ============ */

/* A2 · Page header block — one consistent header per page (green eyebrow + IBM Plex title, icon left where used) */
.phead{margin:0 0 1.6rem}
.phead-ey{font-size:.625rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--green);font-family:var(--font-alt);margin-bottom:.6rem}
.phead-row{display:flex;align-items:center;gap:.75rem}
.phead-ico{width:34px;height:34px;border-radius:6px;background:var(--navy-light);color:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.phead-ico.use{background:var(--teal-light);color:var(--teal-dark)}
.phead-ico svg{width:18px;height:18px}
.phead-t{font-family:var(--font-alt);font-size:1.5rem;font-weight:600;color:var(--navy);letter-spacing:-.015em;line-height:1.14}
.phead-stand{font-size:.9375rem;color:var(--sub);font-weight:300;line-height:1.62;max-width:680px;margin-top:.7rem;text-wrap:pretty}

/* A1 · Inner tabs (deep-dive parts / toolkit stages) — flat, active = teal hairline, navy label */
.ptabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.6rem;overflow-x:auto}
.ptab{padding:.7rem 1.1rem;font-size:.8125rem;font-weight:500;color:var(--muted);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--font-alt);transition:color .14s;display:flex;align-items:center;gap:.5rem}
.ptab:hover{color:var(--navy)}
.ptab.on{color:var(--navy);font-weight:600;border-bottom-color:var(--teal)}
.ptab:focus-visible{outline:2px solid rgba(0,133,124,.6);outline-offset:2px;border-radius:3px}
.ptab-n{font-family:var(--font-mono);font-size:.6875rem;font-weight:500;opacity:.6}

/* A3 · Add-to-plan primitive — teal, use-dot, with confirmed state */
.addplan{display:inline-flex;align-items:center;gap:.5rem;background:var(--teal);color:#fff;font-size:.8125rem;font-weight:600;padding:.6rem 1.05rem;border-radius:4px;font-family:var(--font-alt);border:none;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.addplan:hover{background:var(--teal-dark)}
.addplan .use-dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0}
.addplan svg{width:15px;height:15px}
.addplan.done{background:var(--teal-light);color:var(--teal-dark);cursor:default}
.addplan.done .use-dot{background:var(--teal-dark)}
.addplan.done:hover{background:var(--teal-light)}

/* A4 · Lead-figure treatment (the 23.1% style) */
.leadfig{display:flex;align-items:flex-start;gap:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.7rem 1.85rem;margin-bottom:1.4rem}
.leadfig-n{font-family:var(--font-alt);font-size:4rem;font-weight:600;line-height:.88;letter-spacing:-.03em;color:var(--navy);flex-shrink:0}
.leadfig-body{padding-top:.35rem}
.leadfig-line{font-size:1.0625rem;color:var(--text);font-weight:400;line-height:1.5;max-width:540px;text-wrap:pretty}
.leadfig-src{font-size:.625rem;color:var(--muted);font-family:var(--font-mono);margin-top:.75rem;letter-spacing:.02em}

/* A5 · Membership nod + Intercom affordance (replaces advisory + up-next) */
.memnod{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.35rem 1.55rem;margin-top:1.4rem}
.memnod-l{font-size:.875rem;color:var(--sub);font-weight:300;line-height:1.6;max-width:640px;text-wrap:pretty}
.memnod-l b{color:var(--navy);font-weight:600}
.memnod-cta{display:inline-flex;align-items:center;gap:.5rem;background:none;border:1.5px solid var(--teal);color:var(--teal-dark);font-size:.8125rem;font-weight:600;padding:.62rem 1.15rem;border-radius:4px;font-family:var(--font-alt);cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0}
.memnod-cta:hover{background:var(--teal-light)}
.memnod-cta svg{width:15px;height:15px}

/* A6 · On-page download control (file-type label + down arrow) */
.dlbtn{display:inline-flex;align-items:center;gap:.55rem;background:var(--surface);border:1px solid var(--navy-rule);color:var(--navy);font-size:.75rem;font-weight:600;padding:.5rem .9rem;border-radius:4px;font-family:var(--font-alt);cursor:pointer;transition:all .15s}
.dlbtn:hover{background:var(--navy-light);border-color:var(--navy)}
.dlbtn .fmt{font-family:var(--font-mono);font-size:.625rem;font-weight:500;letter-spacing:.04em;color:var(--muted)}
.dlbtn svg{width:14px;height:14px}

/* B1 · Larger, more breathable figures */
.stat{padding:1.5rem 1.5rem}
.stat-v{font-size:2.4rem;margin-bottom:.75rem;letter-spacing:-.03em}
.bi{margin-bottom:.85rem}
.bi-val{font-size:.75rem}
.bi-track{height:6px}

/* B2 · Retake — persistent selected state as default, colour change on hover */
.d-btn.retake{background:var(--teal-light);color:var(--teal-dark);border:1.5px solid transparent}
.d-btn.retake:hover{background:var(--teal);color:#fff}

/* B3 · Deep-dive parts + DTTT position lifted clear */
.dd-eyebrow{font-size:.625rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--teal-text);font-family:var(--font-alt);margin-bottom:.4rem}
.dd-title{font-family:var(--font-alt);font-size:1.2rem;font-weight:600;color:var(--navy);letter-spacing:-.01em;line-height:1.25;margin-bottom:.6rem}
.dd-arg{font-size:1.0625rem;color:var(--text);font-weight:400;line-height:1.55;max-width:660px;margin-bottom:1.3rem;text-wrap:pretty}
.pos-strip.lift{margin:1.7rem 0 .3rem;border-top:3px solid var(--teal);padding-top:1.35rem}
.pos-strip.lift .pos-t{font-size:1.0625rem}
.pos-strip.lift .pos-l{opacity:.6}

/* Best-practice number aligned to box title */
.bp-head{display:flex;align-items:baseline;gap:.75rem;margin-bottom:.55rem}
.bp-n{font-family:var(--font-alt);font-size:1.5rem;font-weight:600;color:var(--navy);opacity:.32;letter-spacing:-.02em;line-height:1;flex-shrink:0}
.bp-head .bp-title{margin-bottom:0}

/* Toolkit stage flow (stepper above the tabs) */
.flow{display:flex;align-items:center;gap:.55rem;margin-bottom:1.5rem;flex-wrap:wrap}
.flow-step{display:flex;align-items:center;gap:.55rem;font-size:.75rem;font-weight:500;color:var(--muted);font-family:var(--font-alt)}
.flow-step .n{width:22px;height:22px;border-radius:50%;background:var(--navy-light);color:var(--navy);font-family:var(--font-mono);font-size:.625rem;font-weight:600;display:flex;align-items:center;justify-content:center}
.flow-step.on{color:var(--navy)}
.flow-step.on .n{background:var(--teal);color:#fff}
.flow-sep{color:var(--navy-rule);font-size:.75rem}

/* sb-divider */
.sb-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 12px}

/* tool-panel overlay */
.tool-panel{position:fixed;inset:0;background:#fff;z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.tool-panel.open{transform:translateX(0)}
.tool-panel-head{display:flex;align-items:center;gap:1rem;padding:.85rem 1.2rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.tool-panel-back{display:flex;align-items:center;gap:.5rem;font-size:.8125rem;font-weight:600;color:var(--navy);font-family:var(--font-alt);background:none;border:none;cursor:pointer;padding:.4rem .7rem;border-radius:4px;transition:background .14s}
.tool-panel-back:hover{background:var(--navy-light)}
.tool-panel iframe{flex:1;width:100%;border:none}

/* pathway-forward boxes */
.path-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.4rem}
.path-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.2rem 1.3rem}
.path-box-l{font-size:.5625rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--font-alt);margin-bottom:.5rem}
.path-box-t{font-family:var(--font-alt);font-size:.9375rem;font-weight:600;color:var(--navy);margin-bottom:.45rem}
.path-box-d{font-size:.8125rem;color:var(--sub);font-weight:300;line-height:1.55}

/* retake button */
.retake-btn{background:none;border:1.5px solid var(--teal);color:var(--teal-dark);font-size:.8125rem;font-weight:600;padding:.62rem 1.15rem;border-radius:4px;font-family:var(--font-alt);cursor:pointer;transition:background .15s}
.retake-btn:hover{background:var(--teal-light)}

/* plan flash */
.ni.flash{background:rgba(0,133,124,.18);transition:background .6s}

/* implementation plan UI */
.plan-col{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin-bottom:1.4rem}
.plan-phase-head{font-size:.625rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--font-alt);padding-bottom:.55rem;border-bottom:2px solid var(--teal);margin-bottom:.85rem}
.plan-task{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.95rem 1rem;margin-bottom:.55rem}
.plan-task.manual{border-left:3px solid var(--teal)}
.plan-task-title{font-size:.875rem;font-weight:500;color:var(--text);margin-bottom:.4rem;display:flex;align-items:flex-start;gap:.6rem}
.plan-task-done .plan-task-title span{text-decoration:line-through;opacity:.5}
.plan-task-meta{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.plan-task-fields{display:flex;flex-direction:column;gap:.35rem;margin-top:.5rem}
.plan-task-field{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--sub)}
.plan-task-field label{min-width:70px;font-weight:500}
.plan-task-field input,.plan-task-field select{flex:1;font-size:.75rem;padding:.2rem .4rem;border:1px solid var(--border);border-radius:3px;font-family:var(--font);color:var(--text);background:var(--bg)}
.plan-task-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.875rem;padding:.1rem .3rem;line-height:1;margin-left:auto;flex-shrink:0}
.plan-task-remove:hover{color:var(--red)}
.plan-done-check{accent-color:var(--teal);width:14px;height:14px;flex-shrink:0;margin-top:2px}
.plan-empty{text-align:center;padding:2.5rem 1.5rem;color:var(--muted);font-size:.875rem;font-weight:300;border:1px dashed var(--border);border-radius:4px;margin:1rem 0}
.plan-add-form{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1rem 1.1rem;display:flex;gap:.65rem;align-items:flex-end;margin-top:1rem}
.plan-add-form input,.plan-add-form select{font-size:.8125rem;padding:.45rem .65rem;border:1px solid var(--border);border-radius:3px;font-family:var(--font);color:var(--text);background:var(--bg)}
.plan-add-form input{flex:1}
.plan-add-form .d-btn.pri{padding:.45rem 1rem;font-size:.8125rem}
.plan-export{display:inline-flex;align-items:center;gap:.5rem;background:none;border:1.5px solid var(--border);color:var(--sub);font-size:.8125rem;font-weight:600;padding:.55rem 1rem;border-radius:4px;font-family:var(--font-alt);cursor:pointer;transition:all .15s}
.plan-export:hover{border-color:var(--navy);color:var(--navy)}

</style>
</head>
<body>

<div class="tool-panel" id="tool-panel"><div class="tool-panel-head"><button class="tool-panel-back" id="tool-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>Back</button><span id="tool-panel-title" style="font-family:var(--font-alt);font-size:.9375rem;font-weight:600;color:var(--navy)"></span></div><iframe id="tool-frame" title="Tool"></iframe></div>
<div class="app">

        Help

      <div class="sb-user"><div class="sb-ava">NH</div><div class="sb-user-info"><div class="sb-user-name">Nicholas Hall</div><div class="sb-user-role">Head of Digital</div></div></div>
    </div>
  </aside>

  <div class="main-col">
    <div class="top-bar">
      <div class="top-bar-inner">
        <div class="bc">Knowledge Hub <span class="sep">›</span> AI Discoverability <span class="live-mini"><span class="d"></span>Live</span></div>
        <h1 class="pt">AI Discoverability</h1>
        <div class="ps">Make your destination findable, cited and recommended in AI answers, and know whether it is working.</div>

<script>
/* ── MEMBER data layer ── */
var MEMBER={
  _data:{diagnostic:{answers:{},profile:null,completedAt:null},plan:{tasks:[]},roadmap:{horizon1:[],horizon2:[],horizon3:[],savedAt:null}},
  get:function(k){return k?this._data[k]:this._data;},
  set:function(k,v){this._data[k]=v;this._persist();},
  _persist:function(){try{localStorage.setItem('dttt_aid',JSON.stringify(this._data));}catch(e){}},
  _load:function(){try{var d=localStorage.getItem('dttt_aid');if(d)this._data=JSON.parse(d);}catch(e){}}
};
// Airtable mirrors aggregate data only, for benchmarking. Not the source of truth.
// Data is collected anonymously to power benchmarking in a later release.
MEMBER._load();

var S={sec:'overview',dd:null,ddPart:0,stage:0,plan:{},diagStep:0,ans:{},diagDone:false};
function set(p){Object.assign(S,p);render();}
function ic(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
var arrow='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>';
var dnArrow='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="m19 12-7 7-7-7"></path></svg>';
var chatIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>';

function phead(title,standfirst,icoPath,use){
  return '<div class="phead"><div class="phead-ey">AI Discoverability</div><div class="phead-row">'+
    (icoPath?'<span class="phead-ico'+(use?' use':'')+'">'+ic(icoPath)+'</span>':'')+
    '<div class="phead-t">'+title+'</div></div>'+
    (standfirst?'<div class="phead-stand">'+standfirst+'</div>':'')+'</div>';
}
function dlbtn(fmt,href){
  if(href)return '<a class="dlbtn" href="'+href+'" download><span>Download</span><span class="fmt">'+fmt+'</span>'+dnArrow+'</a>';
  return '<button class="dlbtn" data-noop><span>Download</span><span class="fmt">'+fmt+'</span>'+dnArrow+'</button>';
}
function addplan(id,title,phase,source){
  var tasks=MEMBER.get('plan').tasks||[];
  var done=tasks.some(function(t){return t.id===id;})||S.plan[id];
  return '<button class="addplan'+(done?' done':'')+'" data-plan="'+id+'" data-plan-title="'+(title||id)+'" data-plan-phase="'+(phase||'Foundation')+'" data-plan-source="'+(source||'tool')+'"><span class="use-dot"></span>'+(done?'Added to plan':'Add to plan')+'</button>';
}
var memnod='<div class="memnod"><div class="memnod-l"><b>Impact and Evolve members</b> go deeper on this with hands-on workshops and direct DTTT team access. Use your workshop credits to run the diagnostic and content audit with your own team.</div><button class="memnod-cta" onclick="if(window.Intercom)Intercom(\'show\')">'+chatIco+'Talk to us '+arrow+'</button></div>';

/* ---------- OVERVIEW ---------- */
function rOverview(){
  var stats=[
    ['23.1%','The only trip-planning channel gaining share, up from 16.8% a year earlier, and rising across every market.','Future Partners'],
    ['93%','The zero-click reality. Around 93% of Google AI Mode searches end without a click to any website.','Semrush'],
    ['5\xd7','AI-referred visitors convert several times better than organic search traffic, 14.2% against 2.8%. Smaller volume, higher intent.','Superprompt'],
    ['17.75%','The average brand-mention rate for travel and hospitality across AI answers. There is room to be louder.','AthenaHQ, 2026']
  ];
  var routes=[
    ['snapshot','Research snapshot','The data picture in two minutes: where discovery is moving and how exposed your channels are.'],
    ['deepdive','Deep dive','Five themes, each led by the argument and the DTTT position. Read the full body only where it matters to you.'],
    ['bestpractice','Best practice','Destination cases, with the honest detail: what it cost, what failed, and whether you could replicate it.'],
    ['diagnostic','Readiness diagnostic','Five dimensions scored against your peers, with a gap analysis and a 90-day plan.'],
    ['tools','Tools','Three tools you can run today. Each does one job.'],
    ['resources','Resources','The source list, the monitoring-tool landscape and the free validators, ready to use.']
  ];
  return '<div class="page">'+
    phead('Overview')+
    '<div class="meta-bar">'+
      '<div class="mc"><div class="mc-l">Programme</div><div class="mc-v">AI Discoverability</div></div>'+
      '<div class="mc"><div class="mc-l">Research completed</div><div class="mc-v">May 2026</div></div>'+
      '<div class="mc"><div class="mc-l">Organisations studied</div><div class="mc-v">21 DMOs</div></div>'+
      '<div class="mc"><div class="mc-l">Member access</div><div class="mc-v">Evolve tier and above</div></div>'+
    '</div>'+
    '<div class="leadfig"><div class="leadfig-n">'+stats[0][0]+'</div><div class="leadfig-body"><div class="leadfig-line">'+stats[0][1]+'</div><div class="leadfig-src">'+stats[0][2]+'</div></div></div>'+
    '<p style="font-size:.9375rem;color:var(--sub);margin-bottom:1.4rem;font-weight:300;line-height:1.6">A destination can rank well and still be absent from the answer a traveller reads.</p>'+
    '<div class="g3 mb">'+stats.slice(1).map(function(s){return '<div class="stat"><div class="stat-v">'+s[0]+'</div><div class="stat-l">'+s[1]+'</div><div class="stat-s">'+s[2]+'</div></div>';}).join('')+'</div>'+
    '<div class="g2r">'+
      '<div>'+
        '<div class="fc key mb"><div class="fc-l">The central argument of this programme</div>'+
        '<div class="fc-t">Search has split, it has not migrated. Travellers now move between classic search, AI overviews and standalone assistants, often inside one planning journey. The destinations that stay visible will not pick a side. They will manage both pathways deliberately, and measure their presence in each.</div></div>'+
        '<div class="card"><div class="sec-head" style="padding:1.1rem 1.3rem 0;margin-bottom:0"><span class="sec-ico">'+ic('<path d="M3 3v18h18"></path><path d="m7 14 4-4 3 3 5-6"></path>')+'</span><span class="sec-title">What this programme covers</span></div>'+
          '<div style="padding:.6rem .35rem .5rem">'+routes.map(function(r){return '<div class="route" data-goto="'+r[0]+'"><span class="route-n">→</span><div><div class="route-t">'+r[1]+'</div><div class="route-d">'+r[2]+'</div></div><span class="route-ar">›</span></div>';}).join('')+'</div>'+
        '</div>'+
      '</div>'+
      '<div>'+
        '<div class="card card-pad">'+
          '<div class="lbl navy" style="margin-bottom:.85rem">How to use this research</div>'+
          [['Start with the snapshot','The headline picture in two minutes, ready to brief your team.'],
           ['Go deep where it matters','Skim every position in the deep dive; read the body only where it is relevant.'],
           ['Take the diagnostic','Five minutes for a personalised read on where you stand, with peer benchmarking.'],
           ['Run a tool','Pick one job to do this week. The baseline runner is the place to start.']].map(function(x,i){return '<div style="display:flex;gap:.8rem;padding:.65rem 0;'+(i<3?'border-bottom:1px solid var(--border)':'')+'"><div style="font-family:var(--font-mono);font-size:.75rem;color:var(--navy);opacity:.35;width:20px">0'+(i+1)+'</div><div><div style="font-size:.8125rem;font-weight:500;margin-bottom:.15rem">'+x[0]+'</div><div style="font-size:.8125rem;color:var(--sub);font-weight:300">'+x[1]+'</div></div></div>';}).join('')+
        '</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

/* ---------- SNAPSHOT (key data points) ---------- */
function rSnapshot(){
  var channel=[['AI assistants',23.1,'var(--teal)'],['Search engines',61,'var(--navy)'],['OTAs & meta',48,'var(--navy)'],['Social & video',39,'var(--navy)'],['Destination sites',31,'var(--navy)']];
  var exposure=[['Top-of-funnel discovery',82],['Inspiration & ideas',74],['Itinerary & planning',58],['Practical pre-booking info',26]];
  return '<div class="page">'+
    phead('Key data points','It is moving faster than most destinations can see, and the ones that act early hold the advantage.','<path d="M3 3v18h18"></path><path d="M7 16l4-5 3 3 4-7"></path>')+
    '<div class="fc warn mb"><div class="fc-l">Read this first · data status</div><div class="fc-t" style="font-size:.875rem;font-weight:400">The figures below are external baselines, clearly labelled, and stand in until member benchmark data is collected. A short member pulse will replace them with your community\'s own numbers. Treat them as direction, not destination.</div></div>'+
    '<div class="g2 mb">'+
      '<div class="card card-pad"><div class="sec-head" style="margin-bottom:1rem"><span class="sec-ico">'+ic('<path d="M3 3v18h18"></path><path d="M7 16l4-5 3 3 4-7"></path>')+'</span><span class="sec-title">Where discovery happens now</span><span class="ext-badge">External baseline</span></div>'+
        channel.map(function(c){return '<div class="bi"><div class="bi-name">'+c[0]+'</div><div class="bi-track"><div class="bi-fill" style="width:'+c[1]+'%;background:'+c[2]+'"></div></div><div class="bi-val" style="color:'+(c[2]==='var(--teal)'?'var(--teal-text)':'var(--navy)')+'">'+c[1]+'%</div></div>';}).join('')+
        '<div style="font-size:.75rem;color:var(--muted);font-weight:300;margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border)">Share of planning journeys touching each channel. AI assistants are the only line rising year on year.</div>'+
      '</div>'+
      '<div class="card card-pad"><div class="sec-head" style="margin-bottom:1rem"><span class="sec-ico">'+ic('<path d="M12 2a10 10 0 1 0 10 10"></path><path d="M12 12 20 7"></path>')+'</span><span class="sec-title">Where the destination site is most exposed</span><span class="ext-badge">External baseline</span></div>'+
        exposure.map(function(e){return '<div class="bi"><div class="bi-name">'+e[0]+'</div><div class="bi-track"><div class="bi-fill" style="width:'+e[1]+'%;background:'+(e[1]>60?'var(--red)':e[1]>40?'var(--amber)':'var(--green)')+'"></div></div><div class="bi-val" style="color:'+(e[1]>60?'var(--red)':e[1]>40?'var(--amber)':'var(--green)')+'">'+e[1]+'%</div></div>';}).join('')+
        '<div style="font-size:.75rem;color:var(--muted);font-weight:300;margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border)">Discovery and inspiration are most disrupted by AI. Practical pre-booking information is the function AI does not yet replace.</div>'+
      '</div>'+
    '</div>'+
    '<div class="g3">'+
      '<div class="fc key"><div class="fc-l">Headline finding</div><div class="fc-t" style="font-size:.875rem;font-weight:400">Visibility is now split across pathways that behave differently. A destination can rank well in classic search and be absent from AI answers at the same time.</div></div>'+
      '<div class="fc warn"><div class="fc-l">What should concern most members</div><div class="fc-t" style="font-size:.875rem;font-weight:400">Most DMOs have no way to see whether AI assistants mention them at all. You cannot manage a channel you are not measuring, and few are measuring this one.</div></div>'+
      '<div class="fc good"><div class="fc-l">The opportunity</div><div class="fc-t" style="font-size:.875rem;font-weight:400">AI-referred visitors arrive with high intent and convert well. Being cited correctly is worth more per visit than a top organic position.</div></div>'+
    '</div>'+
  '</div>';
}

/* ---------- DEEP DIVE ---------- */
var THEMES=[
  {eyebrow:'Theme 01',title:'The two pathways: AI overviews and standalone assistants',
   arg:'These are not one channel. AI overviews sit inside classic search and reward the same authority signals; standalone assistants answer from a trained model and reward being a clear, citable source. Optimising for one does not guarantee the other.',
   body:'<div class="body3"><p>An AI overview is generated at the top of a results page and still draws on the ranked index beneath it. The levers that earn a strong organic position, authority, freshness and clear structure, carry over. A standalone assistant is different: it synthesises an answer from what it has absorbed, and only sometimes retrieves the live web. Presence there depends on being unambiguous, frequently referenced and easy to parse.</p><p>The two are decoupling. Overviews now appear on roughly half of queries, yet only around 38% of the pages they cite still rank in the top 10 for that query, down from about 76% a year earlier, and the assistants barely overlap, with only around 11% of cited domains shared between ChatGPT and Perplexity.</p><p><strong>The practical consequence:</strong> you need to know which pathway a given query travels before you decide how to respond to it. Treating them as one channel is the most common and most expensive mistake we saw.</p></div>'+
   '<div class="stat-s" style="margin-bottom:1.1rem">Sources: Ahrefs; Otterly; Aiso</div>'+
   '<div class="pos-strip lift"><div class="pos-l">DTTT position</div><div class="pos-t">Manage both pathways on purpose. Keep your classic search foundations strong for AI overviews, and separately build the clarity and citability that standalone assistants reward. They are complementary investments, not competing ones.</div></div>'+
   '<div class="path-row"><div class="path-box"><div class="path-box-l">Foundation</div><div class="path-box-t">Audit your two pathways</div><div class="path-box-d">Map which queries go to overviews and which go to assistants. They behave differently and need different responses.</div></div><div class="path-box"><div class="path-box-l">Accelerate</div><div class="path-box-t">Build for both simultaneously</div><div class="path-box-d">Classic SEO foundations feed overviews. Clarity, citability and structured data feed standalone assistants. These investments reinforce each other.</div></div><div class="path-box"><div class="path-box-l">Measure</div><div class="path-box-t">Track presence in each pathway</div><div class="path-box-d">Use share of model as your AI-era metric alongside organic position. Measure both quarterly.</div></div></div>'},
  {eyebrow:'Theme 02',title:'The technical foundations: crawl, render, cite',
   arg:'Before any content strategy, a destination has to be legible to machines. Most AI crawlers do not run JavaScript, many waste a third of their fetches on dead URLs, and a site can rank well in Google while being a blank page to ChatGPT and Claude.',
   body:'<div class="body3"><p><strong>Let the right crawlers in.</strong> Allow GPTBot, OAI-SearchBot, Googlebot, Anthropic-AI, PerplexityBot and CCBot, and separate the training crawlers from the search crawlers in robots.txt rather than blocking wholesale. Blunt blocking has a cost: publishers who blocked AI bots lost 23% of traffic, including a 14% fall in human visitors.</p><p><strong>Support the crawl, do not just permit it.</strong> The ChatGPT and Claude crawlers spend over 34% of their fetches hitting 404 pages, against Google’s 8%, and most do not execute JavaScript. Serve critical content in the initial server-rendered HTML, keep sitemaps and redirects clean, and test by disabling JavaScript rather than trusting Google’s renderer.</p><p><strong>Earn citations through substance and structure.</strong> Adding expert quotations lifts AI visibility by about 22% and statistics by about 37%; structuring content into self-contained 50 to 150 word chunks adds a further 17% or so. Front-load the answer, lead with your own data and named, first-hand expertise.</p><p><strong>Where travellers search from shapes what they read.</strong> Localised sites gained 327% more AI Overview visibility for non-English queries than untranslated ones, because models prefer to cite content written natively in the query language. Competition for citations in non-English markets is far thinner than in English. Destinations visible in the markets their visitors come from hold an advantage that destination-centric framing misses.</p></div>'+
   '<div class="stat-s" style="margin-bottom:1.1rem">Sources: Cloudflare Radar; Vercel; Aggarwal et al.; Yu et al.; MultiLipi; Hacks/Hackers</div>'+
   '<div class="pos-strip lift"><div class="pos-l">DTTT position</div><div class="pos-t">Get the foundations right before anything clever. A site AI cannot crawl, cannot read without JavaScript, or cannot extract clean facts from will not be cited, however good the content. Technical legibility is the precondition for everything else.</div></div>'+
   '<div class="path-row"><div class="path-box"><div class="path-box-l">Foundation</div><div class="path-box-t">Check crawler access</div><div class="path-box-d">Run the crawler-access checklist. Make sure the right bots can reach your content, and fix the 404 rate.</div></div><div class="path-box"><div class="path-box-l">Accelerate</div><div class="path-box-t">Serve renderable HTML</div><div class="path-box-d">Critical content in initial HTML, not JavaScript-rendered. Test by disabling JS in your browser.</div></div><div class="path-box"><div class="path-box-l">Measure</div><div class="path-box-t">Track crawl health monthly</div><div class="path-box-d">Monitor 404 rate and crawl frequency for AI bots. Declining crawl frequency is an early warning signal.</div></div></div>'},
  {eyebrow:'Theme 03',title:'Earning citations: substance and structure are different levers',
   arg:'Being cited by an AI answer depends on two separable things: having substance worth citing, and structuring it so a machine can parse it. Most destinations have neither in place, and conflate the two when they try.',
   body:'<div class="body3"><p>Substance is factual specificity: named entities, precise figures, distances, dates and prices that a model can lift with confidence. Structure is legibility: question-answering format, consistent naming and machine-readable markup. They are independent. Beautifully structured but vague content earns nothing; rich but unstructured content is hard to retrieve.</p></div>'+
   '<div class="ba"><div><div class="ba-l" style="color:var(--red)">Hard to cite</div><div class="ba-c">A year-round destination offering world-class scenery and unforgettable experiences for the whole family.</div></div>'+
   '<div><div class="ba-l" style="color:var(--green)">Easy to cite</div><div class="ba-c after">A mountain resort 46km south of the regional capital. The ski area has 36 runs and a 457m vertical drop. Season runs November to April. Average summer temperature 18°C.</div></div></div>'+
   '<div class="ctr-box"><div class="ctr-l">The counter-argument worth taking seriously</div><div class="ctr-t">The schema debate. AI-cited pages are about three times more likely to carry JSON-LD, yet one controlled test found systems read only visible HTML and ignored the markup. The fair reading: markup is not a magic input, but the discipline it forces, clarity, consistency and specificity, is exactly what helps. Treat schema as a means to legibility, not an end in itself, and make sure the content still reads in plain HTML.</div></div>'+
   '<div class="path-row"><div class="path-box"><div class="path-box-l">Foundation</div><div class="path-box-t">Rewrite for specificity</div><div class="path-box-d">Take your ten highest-traffic pages. Add distances, dates, prices and named places. Lead with the direct answer in the first two lines.</div></div><div class="path-box"><div class="path-box-l">Accelerate</div><div class="path-box-t">Add structured data</div><div class="path-box-d">JSON-LD on key entity types: places, events, itineraries. Validate with the Rich Results Test and Schema Markup Validator.</div></div><div class="path-box"><div class="path-box-l">Measure</div><div class="path-box-t">Test citability quarterly</div><div class="path-box-d">Run ten real visitor queries across the main assistants. Record where you appear and what they say about you.</div></div></div>'},
  {eyebrow:'Theme 04',title:'Accuracy and the facilitator question',
   arg:'AI will describe your destination whether you maintain the source material or not. The choice is whether it describes you accurately, and whether your role is to create the content or to make the ecosystem legible.',
   body:'<div class="body3"><p>Three practices keep what AI reads accurate: a regular content audit, attention to experience, expertise, authority and trust as a narrative rather than a checklist, and machine-readable listings for the entities that matter, attractions, events, transport and accommodation. Accuracy now carries a compliance edge too, with the EU’s Empowering Consumers for the Green Transition Directive enforceable from 27 September 2026.</p><p><strong>The facilitator question:</strong> around 95% of AI citations sit on third-party sites rather than a brand’s own domain, and 84% come from earned media. A DMO does not have to write everything. Increasingly its highest-value role is to make the wider ecosystem legible, ensuring partners, operators and listings are accurate and structured, so the destination is represented well even where the DMO is not the author.</p></div>'+
   '<div class="stat-s" style="margin-bottom:1.1rem">Sources: Otterly; Muck Rack; Lewis Silkin</div>'+
   '<div class="pos-strip lift"><div class="pos-l">DTTT position</div><div class="pos-t">Audit for accuracy before you optimise for visibility. There is no benefit in being more findable if what is found is wrong, and a confident wrong answer is harder to correct than a quiet absence.</div></div>'+
   '<div class="path-row"><div class="path-box"><div class="path-box-l">Foundation</div><div class="path-box-t">Audit for accuracy first</div><div class="path-box-d">Check what AI systems say about your destination across the main assistants. Fix wrong facts before optimising for reach.</div></div><div class="path-box"><div class="path-box-l">Accelerate</div><div class="path-box-t">Equip the ecosystem</div><div class="path-box-d">Build partner-information hygiene into a named role. Consistent partner listings in your directory are what AI reads back.</div></div><div class="path-box"><div class="path-box-l">Measure</div><div class="path-box-t">Track third-party accuracy</div><div class="path-box-d">Sample major third-party sources quarterly. Inconsistent information across the web undercuts even strong owned content.</div></div></div>'},
  {eyebrow:'Theme 05',title:'Measuring what matters: share of model',
   arg:'You cannot improve what you cannot see. The single most useful new metric is share of model: how often, and how favourably, AI assistants mention your destination for the queries that matter to you.',
   body:'<div class="body3"><div class="fc key" style="margin-bottom:1rem"><div class="fc-l">Share of model defined</div><div class="fc-t">Share of voice is the established metric. It measures a brand\'s overall visibility across media, paid and organic, relative to competitors. Share of model is the AI-era metric within it. It measures how often AI systems such as ChatGPT, Gemini or Claude reference or recommend a brand when answering a question. Treat share of model as a subset of share of voice. That framing lets you position GEO as one channel inside a broader marketing picture rather than a metric of its own.</div></div><p>Share of model is established with a fixed prompt set run across the main assistants, recording where you appear and what is said. Because answers are non-deterministic, a baseline must be built from repeated runs, not a single reading. Two supporting techniques help: reverse prompt engineering, working back from the answers to understand which sources shaped them, and watching for dark AI, the assistant-mediated demand that never reaches your analytics because the journey ends in the answer. Around 85% of the pages ChatGPT retrieves never appear in its final response.</p></div>'+
   '<div class="stat-s" style="margin-bottom:1.1rem">Sources: AthenaHQ; SparkToro; AirOps</div>'+
   '<div class="pos-strip lift"><div class="pos-l">DTTT position</div><div class="pos-t">Add share of model to your digital KPIs alongside organic position. Measured quarterly, it is the clearest evidence of whether your AI-search work is paying off, and the strongest case for continued investment. Treat large swings with caution, as they may simply reflect a model update.</div></div>'+
   '<div class="ctr-box"><div class="ctr-l">The narrative worth resisting</div><div class="ctr-t">The "SEO is dead" framing. It is not. Classic search still drives the majority of discovery and feeds AI overviews directly, and Google\'s own guidance confirms SEO remains foundational. The honest position is additive: AI search is a new layer to manage and measure on top of solid search foundations, not a replacement for them.</div></div>'+
   '<div class="path-row"><div class="path-box"><div class="path-box-l">Foundation</div><div class="path-box-t">Build a baseline</div><div class="path-box-d">Run ten real visitor queries across ChatGPT, Gemini and Claude, with memory off. Record where you appear and what is said. That is your share of model baseline.</div></div><div class="path-box"><div class="path-box-l">Accelerate</div><div class="path-box-t">Add a monitoring tool</div><div class="path-box-d">Once you have a baseline, a dedicated tool such as Profound or Otterly lets you track it at scale. Start with the manual set first.</div></div><div class="path-box"><div class="path-box-l">Measure</div><div class="path-box-t">Review quarterly</div><div class="path-box-d">Set a fixed prompt set and run it every quarter. Track changes alongside your SEO metrics. Treat large swings as model-update signals, not performance signals.</div></div></div>'}
];
